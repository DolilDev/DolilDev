name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#70a5fd
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#70a5fd

      - name: Remove progress bar and crop bottom whitespace
        run: |
          sed -i 's|<rect class="u u[0-9]*"[^/]*/>||g' dist/github-snake.svg dist/github-snake-dark.svg
          sed -i 's|viewBox="-16 -32 880 192" width="880" height="192"|viewBox="-16 -32 880 146" width="880" height="146"|' dist/github-snake.svg dist/github-snake-dark.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
