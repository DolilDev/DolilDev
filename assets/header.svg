<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="Segoe UI, Ubuntu, sans-serif">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd"/>
      <stop offset="50%" stop-color="#bf91f3"/>
      <stop offset="100%" stop-color="#70a5fd"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0; 0.6 0; -0.6 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="1200" height="260" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="260" fill="#1a1b27"/>

    <!-- constellation cluster: left -->
    <g stroke="#70a5fd" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; 45 22; -18 38; 0 0" dur="26s" repeatCount="indefinite"/>
      <line x1="85" y1="55" x2="195" y2="38" opacity="0.3"><animate attributeName="opacity" values="0.1;0.45;0.1" dur="6s" repeatCount="indefinite"/></line>
      <line x1="195" y1="38" x2="265" y2="125" opacity="0.3"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7.5s" repeatCount="indefinite"/></line>
      <line x1="265" y1="125" x2="150" y2="178" opacity="0.3"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="5.2s" repeatCount="indefinite"/></line>
      <line x1="150" y1="178" x2="62" y2="148" opacity="0.3"><animate attributeName="opacity" values="0.45;0.12;0.45" dur="8s" repeatCount="indefinite"/></line>
      <line x1="62" y1="148" x2="85" y2="55" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="6.8s" repeatCount="indefinite"/></line>
      <line x1="195" y1="38" x2="150" y2="178" opacity="0.2"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="9s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="85" cy="55" r="2.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
        <circle cx="195" cy="38" r="2.2" fill="#70a5fd"><animate attributeName="opacity" values="1;0.4;1" dur="4.1s" repeatCount="indefinite"/></circle>
        <circle cx="265" cy="125" r="2.8"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
        <circle cx="150" cy="178" r="2.3" fill="#bf91f3"><animate attributeName="opacity" values="1;0.5;1" dur="3.6s" repeatCount="indefinite"/></circle>
        <circle cx="62" cy="148" r="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.4s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- constellation cluster: right -->
    <g stroke="#bf91f3" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; -50 18; 20 -32; 0 0" dur="30s" repeatCount="indefinite"/>
      <line x1="930" y1="60" x2="1045" y2="42" opacity="0.3"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/></line>
      <line x1="1045" y1="42" x2="1135" y2="110" opacity="0.3"><animate attributeName="opacity" values="0.12;0.45;0.12" dur="5.6s" repeatCount="indefinite"/></line>
      <line x1="1135" y1="110" x2="1060" y2="195" opacity="0.3"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="8.4s" repeatCount="indefinite"/></line>
      <line x1="1060" y1="195" x2="945" y2="160" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6.2s" repeatCount="indefinite"/></line>
      <line x1="945" y1="160" x2="930" y2="60" opacity="0.3"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="7.8s" repeatCount="indefinite"/></line>
      <line x1="1045" y1="42" x2="1060" y2="195" opacity="0.2"><animate attributeName="opacity" values="0.05;0.3;0.05" dur="9.4s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="930" cy="60" r="2.4"><animate attributeName="opacity" values="1;0.4;1" dur="3.8s" repeatCount="indefinite"/></circle>
        <circle cx="1045" cy="42" r="2.7" fill="#bf91f3"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
        <circle cx="1135" cy="110" r="2.1"><animate attributeName="opacity" values="1;0.5;1" dur="4.6s" repeatCount="indefinite"/></circle>
        <circle cx="1060" cy="195" r="2.5" fill="#70a5fd"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
        <circle cx="945" cy="160" r="2"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- constellation cluster: center, behind text -->
    <g stroke="#2ac3de" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; 30 -18; -34 -8; 0 0" dur="24s" repeatCount="indefinite"/>
      <line x1="420" y1="225" x2="540" y2="238" opacity="0.22"><animate attributeName="opacity" values="0.08;0.3;0.08" dur="6.4s" repeatCount="indefinite"/></line>
      <line x1="540" y1="238" x2="665" y2="222" opacity="0.22"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="7.2s" repeatCount="indefinite"/></line>
      <line x1="665" y1="222" x2="780" y2="240" opacity="0.22"><animate attributeName="opacity" values="0.1;0.32;0.1" dur="5.8s" repeatCount="indefinite"/></line>
      <line x1="540" y1="40" x2="660" y2="28" opacity="0.22"><animate attributeName="opacity" values="0.28;0.08;0.28" dur="8.2s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="420" cy="225" r="2"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
        <circle cx="540" cy="238" r="2.3" fill="#2ac3de"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.2s" repeatCount="indefinite"/></circle>
        <circle cx="665" cy="222" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="780" cy="240" r="2.4"><animate attributeName="opacity" values="1;0.4;1" dur="3.9s" repeatCount="indefinite"/></circle>
        <circle cx="540" cy="40" r="2.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="660" cy="28" r="2" fill="#70a5fd"><animate attributeName="opacity" values="1;0.5;1" dur="4.8s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- loose twinkling stars -->
    <g fill="#c0caf5">
      <circle cx="350" cy="120" r="1.3"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.7s" repeatCount="indefinite"/></circle>
      <circle cx="820" cy="95" r="1.5"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="495" cy="150" r="1.1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.3s" repeatCount="indefinite"/></circle>
      <circle cx="745" cy="140" r="1.2"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
    </g>

    <!-- title -->
    <text x="600" y="155" text-anchor="middle" font-size="84" font-weight="800" letter-spacing="4" fill="url(#text-grad)">DolilDev</text>
    <rect x="480" y="185" width="240" height="3" rx="1.5" fill="url(#text-grad)">
      <animate attributeName="width" values="0;240;240" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="600;480;480" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
