<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="Segoe UI, Ubuntu, sans-serif">
  <defs>
    <radialGradient id="blob-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#70a5fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#70a5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bf91f3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bf91f3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ac3de" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2ac3de" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd"/>
      <stop offset="50%" stop-color="#bf91f3"/>
      <stop offset="100%" stop-color="#70a5fd"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0; 0.6 0; -0.6 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <clipPath id="frame">
      <rect width="1200" height="260" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="260" fill="#1a1b27"/>

    <!-- drifting aurora blobs -->
    <g filter="url(#soft)">
      <circle cx="240" cy="80" r="170" fill="url(#blob-blue)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 140 60; 40 -30; 0 0" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="190" r="190" fill="url(#blob-purple)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -160 -70; -60 40; 0 0" dur="22s" repeatCount="indefinite"/>
      </circle>
      <circle cx="620" cy="250" r="150" fill="url(#blob-teal)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 90 -90; -120 -20; 0 0" dur="16s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- twinkling stars -->
    <g fill="#c0caf5">
      <circle cx="110" cy="50" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="200" r="1.3"><animate attributeName="opacity" values="1;0.1;1" dur="3.6s" repeatCount="indefinite"/></circle>
      <circle cx="455" cy="65" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="585" cy="35" r="1.2"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="4.1s" repeatCount="indefinite"/></circle>
      <circle cx="730" cy="210" r="1.7"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="845" cy="55" r="1.4"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="1000" cy="90" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
      <circle cx="1110" cy="180" r="1.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.9s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="150" r="1.1"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="35" r="1.5"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- title -->
    <text x="600" y="155" text-anchor="middle" font-size="84" font-weight="800" letter-spacing="4" fill="url(#text-grad)">DolilDev</text>
    <rect x="480" y="185" width="240" height="3" rx="1.5" fill="url(#text-grad)">
      <animate attributeName="width" values="0;240;240" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="600;480;480" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
