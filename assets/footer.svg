<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120">
  <defs>
    <radialGradient id="fblob-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#70a5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#70a5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fblob-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bf91f3" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#bf91f3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fblob-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ac3de" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2ac3de" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bf91f3"/>
      <stop offset="100%" stop-color="#70a5fd" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.7 0; 0.7 0; -0.7 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="fsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <clipPath id="fframe">
      <rect width="1200" height="120" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#fframe)">
    <rect width="1200" height="120" fill="#1a1b27"/>

    <g filter="url(#fsoft)">
      <circle cx="200" cy="110" r="120" fill="url(#fblob-blue)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 150 -20; 50 20; 0 0" dur="17s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="100" r="130" fill="url(#fblob-purple)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -170 10; -60 -25; 0 0" dur="21s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="130" r="110" fill="url(#fblob-teal)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 80 -35; -100 -10; 0 0" dur="15s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g fill="#c0caf5">
      <circle cx="150" cy="40" r="1.4"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.7s" repeatCount="indefinite"/></circle>
      <circle cx="390" cy="65" r="1.2"><animate attributeName="opacity" values="1;0.1;1" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="30" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="70" r="1.2"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="35" r="1.5"><animate attributeName="opacity" values="0.1;1;0.1" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="1090" cy="60" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    </g>

    <rect x="0" y="2" width="1200" height="3" fill="url(#fline)"/>
  </g>
</svg>
