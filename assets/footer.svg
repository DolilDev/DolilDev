<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="fline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70a5fd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bf91f3"/>
      <stop offset="100%" stop-color="#70a5fd" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.7 0; 0.7 0; -0.7 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="fframe">
      <rect width="1200" height="120" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#fframe)">
    <rect width="1200" height="120" fill="#1a1b27"/>

    <!-- constellation cluster: left -->
    <g stroke="#70a5fd" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; 40 10; -16 -14; 0 0" dur="24s" repeatCount="indefinite"/>
      <line x1="70" y1="35" x2="185" y2="55" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="6.2s" repeatCount="indefinite"/></line>
      <line x1="185" y1="55" x2="290" y2="30" opacity="0.3"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7.4s" repeatCount="indefinite"/></line>
      <line x1="185" y1="55" x2="240" y2="95" opacity="0.25"><animate attributeName="opacity" values="0.12;0.35;0.12" dur="5.4s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="70" cy="35" r="2.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/></circle>
        <circle cx="185" cy="55" r="2.5" fill="#70a5fd"><animate attributeName="opacity" values="1;0.4;1" dur="4.2s" repeatCount="indefinite"/></circle>
        <circle cx="290" cy="30" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
        <circle cx="240" cy="95" r="2.1" fill="#bf91f3"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="3.7s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- constellation cluster: center -->
    <g stroke="#2ac3de" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; -28 12; 24 -10; 0 0" dur="20s" repeatCount="indefinite"/>
      <line x1="480" y1="70" x2="600" y2="40" opacity="0.25"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="6.8s" repeatCount="indefinite"/></line>
      <line x1="600" y1="40" x2="715" y2="75" opacity="0.25"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="5.8s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="480" cy="70" r="2.1"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
        <circle cx="600" cy="40" r="2.4" fill="#2ac3de"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/></circle>
        <circle cx="715" cy="75" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- constellation cluster: right -->
    <g stroke="#bf91f3" stroke-width="1">
      <animateTransform attributeName="transform" type="translate" values="0 0; -42 -8; 18 14; 0 0" dur="27s" repeatCount="indefinite"/>
      <line x1="920" y1="40" x2="1035" y2="65" opacity="0.3"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/></line>
      <line x1="1035" y1="65" x2="1140" y2="35" opacity="0.3"><animate attributeName="opacity" values="0.1;0.42;0.1" dur="5.6s" repeatCount="indefinite"/></line>
      <line x1="1035" y1="65" x2="1080" y2="100" opacity="0.25"><animate attributeName="opacity" values="0.32;0.1;0.32" dur="8s" repeatCount="indefinite"/></line>
      <g stroke="none" fill="#c0caf5">
        <circle cx="920" cy="40" r="2.3"><animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/></circle>
        <circle cx="1035" cy="65" r="2.6" fill="#bf91f3"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="1140" cy="35" r="2"><animate attributeName="opacity" values="1;0.5;1" dur="4.4s" repeatCount="indefinite"/></circle>
        <circle cx="1080" cy="100" r="2.1" fill="#70a5fd"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- loose twinkling stars -->
    <g fill="#c0caf5">
      <circle cx="380" cy="30" r="1.3"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="800" cy="50" r="1.4"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.7s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="90" r="1.1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.1s" repeatCount="indefinite"/></circle>
    </g>

    <rect x="0" y="2" width="1200" height="3" fill="url(#fline)"/>
  </g>
</svg>
